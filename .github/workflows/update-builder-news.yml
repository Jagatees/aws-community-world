name: Update Builder News

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh Builder Center news
        run: npm run update:news

      - name: Commit updated news feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json
          git diff --staged --quiet || git commit -m "chore: refresh Builder Center news"

      - name: Push changes
        run: git push
